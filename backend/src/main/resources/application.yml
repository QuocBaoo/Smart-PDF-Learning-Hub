server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: smart-pdf-learning-hub-backend
  datasource:
    url: jdbc:postgresql://${SUPABASE_DB_HOST:localhost}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=require
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:yourpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Database is managed by Supabase SQL scripts directly
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Supabase Auth Secret configuration
supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:your-default-local-super-secret-key-32charsminimum!}

# AI configuration
gemini:
  api:
    key: ${GEMINI_API_KEY:your-gemini-key}
    url: https://generativelanguage.googleapis.com/v1beta/models
